name: LEK TestLab

on:
  push:
    branches: [main, staging, production]
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Hvilken app skal testes?"
        required: true
        default: "all"
        type: choice
        options:
          - lek
          - varroascan
          - all

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install

      - name: Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Resolve target + baseURLs
        shell: bash
        env:
          LEK_STAGING_URL: ${{ secrets.LEK_STAGING_URL }}
          VARROASCAN_STAGING_URL: ${{ secrets.VARROASCAN_STAGING_URL }}
          LEK_PROD_URL: ${{ secrets.LEK_PROD_URL }}
          VARROASCAN_PROD_URL: ${{ secrets.VARROASCAN_PROD_URL }}
        run: |
          ref="${{ github.ref_name }}"
          event="${{ github.event_name }}"
          input_target="${{ github.event.inputs.target }}"

          if [ "$event" = "workflow_dispatch" ] && [ -n "$input_target" ]; then
            target="$input_target"
          elif [ "$ref" = "staging" ]; then
            target="all"
          else
            target="lek"
          fi

          echo "TARGET=$target" >> "$GITHUB_ENV"

          if [ "$ref" = "production" ]; then
            echo "LEK_BASE_URL=${LEK_PROD_URL:-$LEK_STAGING_URL}" >> "$GITHUB_ENV"
            echo "VARROASCAN_BASE_URL=${VARROASCAN_PROD_URL:-$VARROASCAN_STAGING_URL}" >> "$GITHUB_ENV"
          else
            echo "LEK_BASE_URL=$LEK_STAGING_URL" >> "$GITHUB_ENV"
            echo "VARROASCAN_BASE_URL=$VARROASCAN_STAGING_URL" >> "$GITHUB_ENV"
          fi

      - name: Run tests
        env:
          TARGET: ${{ env.TARGET }}
          LEK_BASE_URL: ${{ env.LEK_BASE_URL }}
          VARROASCAN_BASE_URL: ${{ env.VARROASCAN_BASE_URL }}
          LEK_EMAIL: ${{ secrets.LEK_EMAIL }}
          LEK_PASSWORD: ${{ secrets.LEK_PASSWORD }}
        run: npm test

      - name: Prepare Pages
        if: always()
        run: |
          mkdir -p public
          cp index.html style.css app.js manifest.webmanifest sw.js favicon.svg public/
          touch public/.nojekyll

          mkdir -p reports
          node -e "const fs=require('fs');const meta={branch:process.env.GITHUB_REF_NAME,sha:process.env.GITHUB_SHA,runId:process.env.GITHUB_RUN_ID,runNumber:process.env.GITHUB_RUN_NUMBER,runAttempt:process.env.GITHUB_RUN_ATTEMPT,createdAt:new Date().toISOString()};fs.mkdirSync('reports',{recursive:true});fs.writeFileSync('reports/meta.json',JSON.stringify(meta,null,2));"

          if [ -d reports ]; then cp -R reports public/; fi
          if [ -d screenshots ]; then cp -R screenshots public/; fi
          if [ -d test-results ]; then cp -R test-results public/; fi

          if [ -d reports/playwright-report ]; then
            cp -R reports/playwright-report "public/reports/playwright-report-${GITHUB_RUN_ID}"
          fi

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lek-testlab-artifacts
          path: |
            reports
            screenshots
            test-results

  deploy:
    if: always() && (github.ref_name == 'main' || github.ref_name == 'staging' || github.ref_name == 'production')
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
